<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Create Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5" style="max-width: 700px;">

    <h2 class="mb-4 text-center">Student Profile</h2>

    <form method="post">

        <div class="mb-3">
            <label>Email *</label>
            <input type="email" name="email" placeholder="Email" required><br><br>

        </div>

        <div class="mb-3">
            <label>Name *</label>
            <input name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>University</label>
            <input name="university" class="form-control">
        </div>

        <div class="mb-3">
            <label>Country</label>
            <input name="country" class="form-control">
        </div>

        <div class="mb-3">
            <label>Skills</label>
            <textarea name="skills" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label>Goals</label>
            <textarea name="goals" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label>Interests</label>
            <input name="interests" class="form-control">
        </div>

        <div class="mb-3">
            <label>Links</label>
            <input name="links" class="form-control">
        </div>

        <button class="btn btn-dark w-100">Save Profile</button>

    </form>

</div>

</body>
</html>
