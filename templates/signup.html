{% extends "base.html" %}

{% block title %}Регистрация — Gold Students Club{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: var(--spacing-xl) var(--spacing-lg);">
    <div style="width: 100%; max-width: 460px;">

        <div style="text-align: center; margin-bottom: var(--spacing-xl);">
            <div style="font-size: 2.5rem; margin-bottom: var(--spacing-sm); line-height: 1;">
                <span style="color: var(--gold); text-shadow: 0 0 20px var(--gold-glow);">★</span>
            </div>
            <h1 style="font-size: var(--font-size-3xl); margin-bottom: 8px;">Присоединиться</h1>
            <p style="color: var(--gray-500); margin: 0; font-size: var(--font-size-sm);">Создайте аккаунт Gold Students Club</p>
        </div>

        <div class="card" style="padding: var(--spacing-xl);">
            <form method="post">

                <!-- Role selector -->
                <div class="form-group">
                    <label class="form-label">Я регистрируюсь как</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <label class="role-card" for="role_student">
                            <input type="radio" id="role_student" name="role" value="student" checked hidden>
                            <div class="role-card-inner">
                                <span class="role-icon">🎓</span>
                                <strong>Студент</strong>
                                <span class="role-desc">Участвую в конкурсах, вступаю в сообщества</span>
                            </div>
                        </label>
                        <label class="role-card" for="role_organizer">
                            <input type="radio" id="role_organizer" name="role" value="organizer" hidden>
                            <div class="role-card-inner">
                                <span class="role-icon">🏆</span>
                                <strong>Организатор</strong>
                                <span class="role-desc">Публикую мероприятия и создаю сообщества</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email <span style="color: var(--gold);">*</span></label>
                    <input type="email" name="email" class="form-control"
                           placeholder="your@email.com" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Имя <span style="color: var(--gold);">*</span></label>
                    <input type="text" name="name" class="form-control"
                           placeholder="Ваше имя" required>
                </div>
                <div class="form-group" style="margin-bottom: var(--spacing-lg);">
                    <label class="form-label">Пароль <span style="color: var(--gold);">*</span></label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Не менее 6 символов" required minlength="6">
                    <small style="color: var(--gray-600); font-size: var(--font-size-xs);">Минимум 6 символов</small>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">Создать аккаунт</button>
            </form>
        </div>

        <p class="text-center mt-3" style="color: var(--gray-500); font-size: var(--font-size-sm);">
            Уже есть аккаунт? <a href="{{ url_for('login') }}" style="color: var(--gold);">Войти</a>
        </p>

    </div>
</div>

<style>
.role-card {
    cursor: pointer;
    display: block;
}
.role-card-inner {
    border: 1.5px solid var(--dark-border);
    border-radius: var(--radius-md);
    padding: 14px 12px;
    text-align: center;
    transition: all var(--transition-base);
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: var(--dark-surface);
}
.role-card-inner:hover {
    border-color: rgba(212,175,55,0.4);
    background: var(--dark-light);
}
.role-card input:checked + .role-card-inner {
    border-color: var(--gold);
    background: rgba(212,175,55,0.07);
    box-shadow: 0 0 0 1px rgba(212,175,55,0.3);
}
.role-icon { font-size: 1.6rem; }
.role-card strong { font-size: var(--font-size-sm); color: var(--white); }
.role-desc { font-size: 0.7rem; color: var(--gray-500); line-height: 1.3; }
</style>
{% endblock %}
