{% extends "base.html" %}

{% block title %}Регистрация — Gold Students Club{% endblock %}

{% block content %}
    <div class="page-header">
        <h1>Присоединиться</h1>
        <p class="subtitle">Создайте аккаунт и заполните профиль</p>
    </div>

    <div class="container-narrow">
        <div class="card">
            <form method="post">
                <div class="form-group">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-control" placeholder="your@email.com" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Имя *</label>
                    <input type="text" name="name" class="form-control" placeholder="Ваше имя" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Пароль *</label>
                    <input type="password" name="password" class="form-control" placeholder="Не менее 6 символов" required minlength="6">
                    <small class="text-muted">Минимум 6 символов</small>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">Зарегистрироваться</button>
            </form>
        </div>
        <p class="text-center mt-3 text-muted">
            Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
        </p>
    </div>
{% endblock %}
