<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Add Opportunity</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5" style="max-width: 600px;">

    <h2 class="mb-4 text-center">Add Opportunity</h2>

    <form method="post">

        <div class="mb-3">
            <label class="form-label">Title</label>
            <input name="title" class="form-control" placeholder="Scholarship, Internship..." required>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category" class="form-select">
                <option value="Grant">Grant</option>
                <option value="Internship">Internship</option>
                <option value="Project">Project</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="4"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Deadline</label>
            <input name="deadline" class="form-control" placeholder="15 March 2026">
        </div>

        <button type="submit" class="btn btn-dark w-100">
            Submit Opportunity
        </button>

    </form>

    <div class="text-center mt-3">
        <a href="/opportunities">← Back to opportunities</a>
    </div>

</div>

</body>
</html>
