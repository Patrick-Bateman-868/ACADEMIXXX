<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>{{ op.title }}</h2>

<p>{{ op.description }}</p>

<p><b>Category:</b> {{ op.category }}</p>
<p><b>Deadline:</b> {{ op.deadline }}</p>

{% if op.verified %}
    <span style="color:green;">Verified</span>
{% else %}
    <span style="color:gray;">Pending verification</span>
{% endif %}

<hr>

<h4>Apply for this opportunity</h4>

<form method="post">
    <input type="email" name="email" placeholder="Your email" required>
    <br><br>
    <button type="submit">Apply</button>
</form>

<a href="/opportunities">← Back</a>

</body>
</html>
